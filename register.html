<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta — KXON</title>
    <meta name="description" content="Únete a KXON, la plataforma musical exclusiva. Crea tu cuenta como Fan o Artista.">
    <meta name="robots" content="noindex, nofollow">

    <!-- OG -->
    <meta property="og:title" content="Crear Cuenta — KXON">
    <meta property="og:description" content="Únete a la plataforma musical exclusiva.">
    <meta property="og:type" content="website">

    <!-- PWA -->
    <meta name="theme-color" content="#030303">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="kx-auth" data-page="register">

    <!-- Background -->
    <div class="kx-auth-bg" aria-hidden="true">
        <div class="kx-auth-bg__grid"></div>
        <div class="kx-auth-bg__orb kx-auth-bg__orb--1"></div>
        <div class="kx-auth-bg__orb kx-auth-bg__orb--2"></div>
        <div class="kx-auth-bg__orb kx-auth-bg__orb--3"></div>
    </div>

    <main class="kx-auth-main">
        <div class="kx-auth-card" role="region" aria-labelledby="authTitle">

            <!-- Logo -->
            <a href="index.html" class="kx-auth-logo" aria-label="KXON — Ir al inicio">
                <span class="kx-auth-logo__text" aria-hidden="true">KXON</span>
                <span class="kx-auth-logo__dot" aria-hidden="true"></span>
            </a>

            <!-- Header -->
            <header class="kx-auth-header">
                <h1 class="kx-auth-title" id="authTitle">Crea tu cuenta</h1>
                <p class="kx-auth-subtitle">Únete a la plataforma musical exclusiva</p>
            </header>

            <!-- Messages -->
            <div class="kx-auth-message" id="authMessage" role="alert" aria-live="polite" aria-atomic="true"></div>

            <!-- Google Button -->
            <button class="kx-auth-google" id="btnGoogle" type="button" aria-label="Registrarse con Google">
                <svg class="kx-auth-google__icon" viewBox="0 0 24 24" aria-hidden="true" width="20" height="20">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span class="kx-auth-google__label">Registrarse con Google</span>
                <div class="kx-auth-spinner" aria-hidden="true"></div>
            </button>
            <p class="kx-auth-note">Con Google se registra como <strong>Fan</strong> por defecto</p>

            <!-- Divider -->
            <div class="kx-auth-divider" role="separator">
                <span class="kx-auth-divider__line"></span>
                <span class="kx-auth-divider__text">o con email</span>
                <span class="kx-auth-divider__line"></span>
            </div>

            <!-- Form -->
            <form class="kx-auth-form" id="registerForm" novalidate autocomplete="on">

                <!-- Name -->
                <div class="kx-auth-field" data-field="fullName">
                    <label class="kx-auth-label" for="fullName">Nombre completo</label>
                    <div class="kx-auth-input-wrap">
                        <svg class="kx-auth-input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                            <circle cx="12" cy="8" r="4"/>
                            <path d="M20 21a8 8 0 1 0-16 0"/>
                        </svg>
                        <input
                            type="text"
                            id="fullName"
                            name="fullName"
                            class="kx-auth-input"
                            placeholder="Tu nombre artístico o real"
                            autocomplete="name"
                            required
                            aria-required="true"
                            aria-describedby="fullNameError"
                        >
                        <svg class="kx-auth-input-check" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                    <span class="kx-auth-error" id="fullNameError" aria-live="polite"></span>
                </div>

                <!-- Email -->
                <div class="kx-auth-field" data-field="email">
                    <label class="kx-auth-label" for="email">Email</label>
                    <div class="kx-auth-input-wrap">
                        <svg class="kx-auth-input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                            <rect x="2" y="4" width="20" height="16" rx="3"/>
                            <path d="m2 7 10 6 10-6"/>
                        </svg>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="kx-auth-input"
                            placeholder="tu@email.com"
                            autocomplete="email"
                            required
                            aria-required="true"
                            aria-describedby="emailError"
                        >
                        <svg class="kx-auth-input-check" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                    <span class="kx-auth-error" id="emailError" aria-live="polite"></span>
                </div>

                <!-- Password -->
                <div class="kx-auth-field" data-field="password">
                    <label class="kx-auth-label" for="password">Contraseña</label>
                    <div class="kx-auth-input-wrap">
                        <svg class="kx-auth-input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                            <rect x="3" y="11" width="18" height="11" rx="3"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="kx-auth-input"
                            placeholder="Mínimo 6 caracteres"
                            autocomplete="new-password"
                            required
                            minlength="6"
                            aria-required="true"
                            aria-describedby="passwordError passwordStrength"
                        >
                        <button
                            type="button"
                            class="kx-auth-toggle"
                            id="passToggle"
                            aria-label="Mostrar contraseña"
                            aria-pressed="false"
                        >
                            <svg class="kx-auth-toggle__show" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="kx-auth-toggle__hide" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <div class="kx-auth-strength" id="passwordStrength" aria-live="polite">
                        <div class="kx-auth-strength__track">
                            <div class="kx-auth-strength__bar" id="strengthBar"></div>
                        </div>
                        <span class="kx-auth-strength__label" id="strengthLabel"></span>
                    </div>
                    <span class="kx-auth-error" id="passwordError" aria-live="polite"></span>
                </div>

                <!-- Role Selector -->
                <fieldset class="kx-auth-field kx-auth-roles" data-field="role">
                    <legend class="kx-auth-label">¿Quién eres?</legend>
                    <div class="kx-auth-roles__grid">
                        <label class="kx-auth-role">
                            <input type="radio" name="role" value="fan" checked class="kx-sr-only">
                            <div class="kx-auth-role__card">
                                <div class="kx-auth-role__icon">
                                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
                                        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
                                    </svg>
                                </div>
                                <span class="kx-auth-role__name">Fan</span>
                                <span class="kx-auth-role__desc">Escucha y descubre</span>
                                <div class="kx-auth-role__check" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3">
                                        <polyline points="20 6 9 17 4 12"/>
                                    </svg>
                                </div>
                            </div>
                        </label>
                        <label class="kx-auth-role">
                            <input type="radio" name="role" value="artista" class="kx-sr-only">
                            <div class="kx-auth-role__card">
                                <div class="kx-auth-role__icon">
                                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                        <line x1="12" y1="19" x2="12" y2="23"/>
                                        <line x1="8" y1="23" x2="16" y2="23"/>
                                    </svg>
                                </div>
                                <span class="kx-auth-role__name">Artista</span>
                                <span class="kx-auth-role__desc">Compra beats</span>
                                <div class="kx-auth-role__check" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3">
                                        <polyline points="20 6 9 17 4 12"/>
                                    </svg>
                                </div>
                            </div>
                        </label>
                    </div>
                </fieldset>

                <!-- Submit -->
                <button type="submit" class="kx-auth-submit" id="btnSubmit">
                    <span class="kx-auth-submit__text">Crear Cuenta</span>
                    <div class="kx-auth-spinner" aria-hidden="true"></div>
                </button>

            </form>

            <!-- Footer -->
            <footer class="kx-auth-footer">
                <p>¿Ya tienes cuenta? <a href="login.html" class="kx-auth-link">Inicia sesión</a></p>
            </footer>

        </div>

        <!-- Branding -->
        <p class="kx-auth-brand" aria-hidden="true">
            <span>KXON</span> · Plataforma Musical Exclusiva
        </p>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="js/supabase-config.js" defer></script>
    <script src="js/auth.js" defer></script>
</body>
</html>
